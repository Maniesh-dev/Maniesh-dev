<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E45901" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E45901" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" rx="12" fill="url(#bgGrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" fill="#E45901" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700">📈 Yearly Contribution Growth</text>
  <text x="350" y="55" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="11">Consistent Growth Year Over Year</text>

  <!-- Y-axis labels -->
  <text x="55" y="95" text-anchor="end" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="10">1600</text>
  <text x="55" y="145" text-anchor="end" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="10">1200</text>
  <text x="55" y="195" text-anchor="end" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="10">800</text>
  <text x="55" y="245" text-anchor="end" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="10">400</text>
  <text x="55" y="295" text-anchor="end" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="10">0</text>

  <!-- Grid lines -->
  <line x1="65" y1="90" x2="660" y2="90" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="65" y1="140" x2="660" y2="140" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="65" y1="190" x2="660" y2="190" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="65" y1="240" x2="660" y2="240" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="65" y1="290" x2="660" y2="290" stroke="#30363d" stroke-width="1"/>

  <!-- Bars (height based on value/1600 * 200px range from y=90 to y=290) -->
  <!-- 2021: 420 → height=52.5, y=237.5 -->
  <rect x="105" y="237" rx="4" width="80" height="53" fill="#E45901" opacity="0.5">
    <animate attributeName="height" from="0" to="53" dur="0.8s" fill="freeze"/>
    <animate attributeName="y" from="290" to="237" dur="0.8s" fill="freeze"/>
  </rect>
  <text x="145" y="230" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">420</text>

  <!-- 2022: 780 → height=97.5, y=192.5 -->
  <rect x="215" y="192" rx="4" width="80" height="98" fill="#E45901" opacity="0.65">
    <animate attributeName="height" from="0" to="98" dur="1s" fill="freeze"/>
    <animate attributeName="y" from="290" to="192" dur="1s" fill="freeze"/>
  </rect>
  <text x="255" y="185" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">780</text>

  <!-- 2023: 1100 → height=137.5, y=152.5 -->
  <rect x="325" y="152" rx="4" width="80" height="138" fill="#E45901" opacity="0.8">
    <animate attributeName="height" from="0" to="138" dur="1.2s" fill="freeze"/>
    <animate attributeName="y" from="290" to="152" dur="1.2s" fill="freeze"/>
  </rect>
  <text x="365" y="145" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">1,100</text>

  <!-- 2024: 1350 → height=168.75, y=121.25 -->
  <rect x="435" y="121" rx="4" width="80" height="169" fill="#E45901" opacity="0.9">
    <animate attributeName="height" from="0" to="169" dur="1.4s" fill="freeze"/>
    <animate attributeName="y" from="290" to="121" dur="1.4s" fill="freeze"/>
  </rect>
  <text x="475" y="114" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">1,350</text>

  <!-- 2025: 1450 → height=181.25, y=108.75 -->
  <rect x="545" y="109" rx="4" width="80" height="181" fill="#E45901" opacity="1">
    <animate attributeName="height" from="0" to="181" dur="1.6s" fill="freeze"/>
    <animate attributeName="y" from="290" to="109" dur="1.6s" fill="freeze"/>
  </rect>
  <text x="585" y="102" text-anchor="middle" fill="#E45901" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">1,450</text>

  <!-- Trend line -->
  <polyline points="145,237 255,192 365,152 475,121 585,109" fill="none" stroke="#E45901" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" from="0,1000" to="1000,0" dur="2s" fill="freeze"/>
  </polyline>

  <!-- Trend line dots -->
  <circle cx="145" cy="237" r="4" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="255" cy="192" r="4" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="365" cy="152" r="4" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="475" cy="121" r="4" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="585" cy="109" r="5" fill="#E45901" stroke="#fff" stroke-width="2"/>

  <!-- X-axis labels -->
  <text x="145" y="310" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="12" font-weight="500">2021</text>
  <text x="255" y="310" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="12" font-weight="500">2022</text>
  <text x="365" y="310" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="12" font-weight="500">2023</text>
  <text x="475" y="310" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="12" font-weight="500">2024</text>
  <text x="585" y="310" text-anchor="middle" fill="#E45901" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700">2025</text>

  <!-- Growth arrow indicator -->
  <text x="630" y="340" text-anchor="middle" fill="#2ea043" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">↑ 245% growth</text>

  <!-- Total label -->
  <text x="350" y="365" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="10">Total: 5,100+ contributions across all years</text>
</svg>
