<svg xmlns="http://www.w3.org/2000/svg" width="650" height="400" viewBox="0 0 650 400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="650" height="400" rx="12" fill="url(#bgGrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="260" y="35" text-anchor="middle" fill="#E45901" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700">💻 Language Distribution</text>
  <text x="260" y="52" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="10">Based on 50+ Repositories</text>

  <!-- Donut Chart center: 220, 220 | outer radius: 140 | inner radius: 80 -->
  <!-- Total: 100 -->
  <!-- TypeScript 42%: 0° to 151.2° -->
  <!-- JavaScript 25%: 151.2° to 241.2° -->
  <!-- CSS/SCSS 13%: 241.2° to 288° -->
  <!-- HTML 8%: 288° to 316.8° -->
  <!-- SQL 8%: 316.8° to 345.6° -->
  <!-- Shell 4%: 345.6° to 360° -->

  <!-- Arc segments -->
  <!-- TypeScript 42% - #E45901 -->
  <path d="M220,80 A140,140 0 0,1 352.1,309.8 L297.3,265.6 A80,80 0 0,0 220,140 Z" fill="#E45901" filter="url(#shadow)"/>

  <!-- JavaScript 25% - #FF8C42 -->
  <path d="M352.1,309.8 A140,140 0 0,1 102.4,295.0 L124.2,251.4 A80,80 0 0,0 297.3,265.6 Z" fill="#FF8C42" filter="url(#shadow)"/>

  <!-- CSS/SCSS 13% - #FFB366 -->
  <path d="M102.4,295.0 A140,140 0 0,1 85.4,172.5 L111.7,178.6 A80,80 0 0,0 124.2,251.4 Z" fill="#FFB366" filter="url(#shadow)"/>

  <!-- HTML 8% - #c9d1d9 -->
  <path d="M85.4,172.5 A140,140 0 0,1 111.2,107.4 L135.5,132.8 A80,80 0 0,0 111.7,178.6 Z" fill="#c9d1d9" filter="url(#shadow)"/>

  <!-- SQL 8% - #6e7681 -->
  <path d="M111.2,107.4 A140,140 0 0,1 176.5,82.4 L171.7,118.5 A80,80 0 0,0 135.5,132.8 Z" fill="#6e7681" filter="url(#shadow)"/>

  <!-- Shell 4% - #30363d -->
  <path d="M176.5,82.4 A140,140 0 0,1 220,80 L220,140 A80,80 0 0,0 171.7,118.5 Z" fill="#484f58" filter="url(#shadow)"/>

  <!-- Inner circle (donut hole) -->
  <circle cx="220" cy="220" r="75" fill="#0d1117"/>

  <!-- Center text -->
  <text x="220" y="212" text-anchor="middle" fill="#E45901" font-family="Segoe UI, sans-serif" font-size="28" font-weight="800">100%</text>
  <text x="220" y="232" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="10">Full Stack</text>

  <!-- Legend -->
  <rect x="430" y="90" width="16" height="16" rx="3" fill="#E45901"/>
  <text x="454" y="103" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">TypeScript</text>
  <text x="590" y="103" text-anchor="end" fill="#E45901" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">42%</text>

  <rect x="430" y="120" width="16" height="16" rx="3" fill="#FF8C42"/>
  <text x="454" y="133" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">JavaScript</text>
  <text x="590" y="133" text-anchor="end" fill="#FF8C42" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">25%</text>

  <rect x="430" y="150" width="16" height="16" rx="3" fill="#FFB366"/>
  <text x="454" y="163" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">CSS / SCSS</text>
  <text x="590" y="163" text-anchor="end" fill="#FFB366" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">13%</text>

  <rect x="430" y="180" width="16" height="16" rx="3" fill="#c9d1d9"/>
  <text x="454" y="193" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">HTML</text>
  <text x="590" y="193" text-anchor="end" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">8%</text>

  <rect x="430" y="210" width="16" height="16" rx="3" fill="#6e7681"/>
  <text x="454" y="223" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">SQL</text>
  <text x="590" y="223" text-anchor="end" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">8%</text>

  <rect x="430" y="240" width="16" height="16" rx="3" fill="#484f58"/>
  <text x="454" y="253" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">Shell</text>
  <text x="590" y="253" text-anchor="end" fill="#484f58" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">4%</text>

  <!-- Divider line -->
  <line x1="430" y1="275" x2="600" y2="275" stroke="#30363d" stroke-width="1"/>

  <!-- Summary stats -->
  <text x="430" y="300" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Primary Stack</text>
  <text x="430" y="318" fill="#E45901" font-family="Segoe UI, sans-serif" font-size="10">TypeScript + React + Node.js</text>

  <text x="430" y="345" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Strongest In</text>
  <text x="430" y="363" fill="#E45901" font-family="Segoe UI, sans-serif" font-size="10">Full Stack Web Development</text>
</svg>
