<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" rx="12" fill="url(#bgGrad)" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" fill="#E45901" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700">🎯 Skill Proficiency Radar</text>

  <!-- Radar center: 300, 310 | radius levels: 40, 80, 120, 160, 200 -->
  <!-- Pentagon grid lines (10 points = decagon) -->
  <!-- Level rings at 20%, 40%, 60%, 80%, 100% -->

  <!-- 100% ring -->
  <polygon points="300,110 490,148 558,280 490,412 300,450 110,412 42,280 110,148 178,110 422,110" fill="none" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>

  <!-- Skill axes (10 skills, 36° apart) -->
  <!-- 0°=top, going clockwise -->
  <!-- Angles: 0, 36, 72, 108, 144, 180, 216, 252, 288, 324 -->

  <!-- Grid circles -->
  <circle cx="300" cy="300" r="200" fill="none" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <circle cx="300" cy="300" r="160" fill="none" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <circle cx="300" cy="300" r="120" fill="none" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <circle cx="300" cy="300" r="80" fill="none" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <circle cx="300" cy="300" r="40" fill="none" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Axis lines (10 axes) -->
  <!-- 0°: TypeScript (98%) -->
  <line x1="300" y1="300" x2="300" y2="100" stroke="#30363d" stroke-width="0.5"/>
  <!-- 36°: React/Next.js (95%) -->
  <line x1="300" y1="300" x2="417.6" y2="141.2" stroke="#30363d" stroke-width="0.5"/>
  <!-- 72°: Node.js (93%) -->
  <line x1="300" y1="300" x2="490.2" y2="238.2" stroke="#30363d" stroke-width="0.5"/>
  <!-- 108°: PostgreSQL (90%) -->
  <line x1="300" y1="300" x2="490.2" y2="361.8" stroke="#30363d" stroke-width="0.5"/>
  <!-- 144°: MongoDB (88%) -->
  <line x1="300" y1="300" x2="417.6" y2="458.8" stroke="#30363d" stroke-width="0.5"/>
  <!-- 180°: Prisma (85%) -->
  <line x1="300" y1="300" x2="300" y2="500" stroke="#30363d" stroke-width="0.5"/>
  <!-- 216°: Redis (82%) -->
  <line x1="300" y1="300" x2="182.4" y2="458.8" stroke="#30363d" stroke-width="0.5"/>
  <!-- 252°: Docker (80%) -->
  <line x1="300" y1="300" x2="109.8" y2="361.8" stroke="#30363d" stroke-width="0.5"/>
  <!-- 288°: AWS/Cloud (75%) -->
  <line x1="300" y1="300" x2="109.8" y2="238.2" stroke="#30363d" stroke-width="0.5"/>
  <!-- 324°: JavaScript (97%) -->
  <line x1="300" y1="300" x2="182.4" y2="141.2" stroke="#30363d" stroke-width="0.5"/>

  <!-- Data polygon -->
  <!-- Calculated: skill% * 200/100 = radius, then x = cx + r*sin(angle), y = cy - r*cos(angle) -->
  <!-- TypeScript 98%: r=196, 0° → (300, 104) -->
  <!-- React 95%: r=190, 36° → (411.7, 146.3) -->
  <!-- Node.js 93%: r=186, 72° → (476.9, 242.5) -->
  <!-- PostgreSQL 90%: r=180, 108° → (471.2, 355.6) -->
  <!-- MongoDB 88%: r=176, 144° → (403.4, 442.4) -->
  <!-- Prisma 85%: r=170, 180° → (300, 470) -->
  <!-- Redis 82%: r=164, 216° → (203.6, 432.6) -->
  <!-- Docker 80%: r=160, 252° → (147.8, 349.4) -->
  <!-- AWS 75%: r=150, 288° → (157.3, 253.6) -->
  <!-- JavaScript 97%: r=194, 324° → (186.0, 143.1) -->

  <polygon
    points="300,104 411.7,146.3 476.9,242.5 471.2,355.6 403.4,442.4 300,470 203.6,432.6 147.8,349.4 157.3,253.6 186.0,143.1"
    fill="#E45901" fill-opacity="0.2"
    stroke="#E45901" stroke-width="2.5"
    filter="url(#glow)"
  />

  <!-- Data points -->
  <circle cx="300" cy="104" r="5" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="411.7" cy="146.3" r="5" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="476.9" cy="242.5" r="5" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="471.2" cy="355.6" r="5" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="403.4" cy="442.4" r="5" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="300" cy="470" r="5" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="203.6" cy="432.6" r="5" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="147.8" cy="349.4" r="5" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="157.3" cy="253.6" r="5" fill="#E45901" stroke="#0d1117" stroke-width="2"/>
  <circle cx="186.0" cy="143.1" r="5" fill="#E45901" stroke="#0d1117" stroke-width="2"/>

  <!-- Skill labels with percentages -->
  <text x="300" y="85" text-anchor="middle" fill="#E45901" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700">TypeScript 98%</text>
  <text x="435" y="128" text-anchor="start" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">React/Next.js 95%</text>
  <text x="505" y="242" text-anchor="start" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Node.js 93%</text>
  <text x="490" y="370" text-anchor="start" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">PostgreSQL 90%</text>
  <text x="415" y="465" text-anchor="start" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">MongoDB 88%</text>
  <text x="300" y="495" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Prisma ORM 85%</text>
  <text x="180" y="455" text-anchor="end" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Redis 82%</text>
  <text x="128" y="365" text-anchor="end" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Docker 80%</text>
  <text x="135" y="248" text-anchor="end" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">AWS/Cloud 75%</text>
  <text x="162" y="128" text-anchor="end" fill="#c9d1d9" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">JavaScript 97%</text>

  <!-- Scale labels -->
  <text x="308" y="275" fill="#30363d" font-family="Segoe UI, sans-serif" font-size="8">40%</text>
  <text x="308" y="235" fill="#30363d" font-family="Segoe UI, sans-serif" font-size="8">60%</text>
  <text x="308" y="195" fill="#30363d" font-family="Segoe UI, sans-serif" font-size="8">80%</text>
  <text x="308" y="155" fill="#30363d" font-family="Segoe UI, sans-serif" font-size="8">100%</text>

  <!-- Footer -->
  <text x="300" y="555" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="10">Full Stack · Frontend to Infrastructure</text>
  <text x="300" y="575" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="9">Avg. Proficiency: 88.3%</text>
</svg>
